# ============================================================
# nginx.conf — Nginx config cho React SPA + API proxy
#
# Hai nhiệm vụ chính:
#   1. Serve file tĩnh React (với fallback cho SPA routing)
#   2. Proxy /api/* → backend (Express server)
# ============================================================

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── SPA routing: fallback về index.html ──────────────────
    # Cho phép React Router hoạt động đúng khi refresh trang
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy API requests đến Express backend ───────────────
    # Mọi request /api/* được forward sang service "server"
    location /api/ {
        proxy_pass         http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Bật gzip để tăng tốc độ tải ─────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
