# ============================================================
# docker-compose.yml — Orchestration toàn bộ hệ thống VLXD
#
# Services:
#   mysql   → MySQL 8 database
#   server  → Express backend (port 5000)
#   client  → React/Vite frontend via Nginx (port 5173 → 80)
#   n8n     → Workflow automation (port 5678)
#   ngrok   → Expose n8n ra internet
#
# Chạy: docker-compose up --build
# ============================================================

services:

  # ── 1. MySQL Database ─────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: vlxd_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-sapassword}
      MYSQL_DATABASE: ${DB_NAME:-vlxd_db}
      # MYSQL_USER không được đặt là "root" — root đã tự động tạo bởi MYSQL_ROOT_PASSWORD
    ports:
      - "3308:3306"         # host:3308 → container:3306 (3307 đang được dùng bởi MySQL local)
    volumes:
      - mysql_data:/var/lib/mysql          # persist data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./database/orders.sql:/docker-entrypoint-initdb.d/02_orders.sql:ro
    networks:
      - vlxd_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-sapassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s   # MySQL cần thời gian khởi tạo lần đầu

  # ── 2. Express Backend ────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: vlxd_server
    restart: unless-stopped
    environment:
      PORT: 5000
      DB_HOST: mysql          # tên service thay cho "localhost"
      DB_PORT: 3306           # port bên trong Docker network (không phải 3307)
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-sapassword}
      DB_NAME: ${DB_NAME:-vlxd_db}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-vlxd-secret-2026}
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy   # chờ MySQL sẵn sàng
    networks:
      - vlxd_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── 3. React Frontend (Nginx) ─────────────────────────────
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
      args:
        # Truyền Google Maps API key vào lúc build
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    container_name: vlxd_client
    restart: unless-stopped
    ports:
      - "5173:80"             # truy cập qua http://localhost:5173
    depends_on:
      - server
    networks:
      - vlxd_net

  # ── 4. n8n Workflow Automation ────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: vlxd_n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      # URL dùng cho webhook (sẽ override bởi ngrok nếu cần)
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678/}
      # Tắt telemetry (tùy chọn)
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
    ports:
      - "5678:5678"           # host:5679 → container:5678 (5678 đang được dùng bởi n8n local)
    volumes:
      - n8n_data:/home/node/.n8n    # persist workflows, credentials
    networks:
      - vlxd_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── 5. ngrok — Expose n8n ra internet ────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    container_name: vlxd_ngrok
    restart: unless-stopped
    command:
      - "http"
      - "n8n:5678"              # tunnel đến service n8n trong Docker network
      - "--log=stdout"
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}   # BẮT BUỘC: set trong .env
    ports:
      - "4040:4040"             # ngrok dashboard: http://localhost:4040
    depends_on:
      n8n:
        condition: service_healthy   # chờ n8n sẵn sàng rồi mới tunnel
    networks:
      - vlxd_net

# ── Volumes (persist data) ───────────────────────────────────
volumes:
  mysql_data:
    name: vlxd_mysql_data
  n8n_data:
    name: vlxd_n8n_data

# ── Network ──────────────────────────────────────────────────
networks:
  vlxd_net:
    name: vlxd_network
    driver: bridge
